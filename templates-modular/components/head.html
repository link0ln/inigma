<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <!-- Note: the deprecated XSS-filter meta was removed. Permissions-Policy
         is a response header, not a meta directive — set server-side instead. -->
    <title>Inigma - Secure Message Sharing</title>
    <style>
    {{> tailwind-compiled.css }}
    {{> main.css }}
    {{> crypto-bg.css }}
    </style>
    <script src="https://unpkg.com/@alpinejs/csp@3.15.8/dist/cdn.min.js" defer integrity="sha384-xnBLNTJyXCEHkKKVePh5Vzi1CyXuyWtN5HjqtWbBBchGrbCslU+ThoGQ/DcdOe9o" crossorigin="anonymous"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    
    <!-- Security hardening (inlined at build time) -->
    <script nonce="__CSP_NONCE__">
    {{> security-hardening.js }}
    </script>
</head>
