<!DOCTYPE html>
<html lang="en">
{{> head }}
<script nonce="__CSP_NONCE__">
{{> security-utils.js }}
</script>
<body class="gradient-bg min-h-screen text-white">
    <canvas id="crypto-bg-waves" aria-hidden="true"></canvas>
    <div id="crypto-bg-grid" aria-hidden="true"></div>
    <canvas id="crypto-bg" aria-hidden="true"></canvas>
    <div class="container mx-auto px-4 py-8" x-data="app">
        {{> header }}

        <!-- Main Content -->
        <div class="max-w-4xl mx-auto">
            {{> message-input }}
            {{> success-modal }}
            {{> delete-confirmation-modal }}
            {{> export-key-modal }}
            {{> import-key-modal }}
            {{> credentials-section }}
            {{> secrets-list }}
            {{> pending-secrets }}
            {{> features }}
        </div>

        {{> toast }}
    </div>

    <script nonce="__CSP_NONCE__">
        {{> crypto-functions.js }}
        {{> main-app.js }}
        {{> crypto-bg.js }}
    </script>
</body>
</html>
