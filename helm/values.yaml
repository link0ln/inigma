# Inigma Helm values
# StatefulSet with app (distroless) + nginx-unprivileged sidecar + SQLite persistence

app:
  image:
    repository: ghcr.io/org/inigma
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

nginx:
  image:
    repository: nginxinc/nginx-unprivileged
    tag: "1.28.2-alpine"
    pullPolicy: IfNotPresent

# Application environment
domain: "example.com"
corsOrigins: "https://example.com"

imageCredentials:
  registry: ""
  username: ""
  password: ""

imagePullSecrets:
  - name: regcred

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

persistence:
  size: 1Gi
  storageClass: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  app:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  nginx:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}
