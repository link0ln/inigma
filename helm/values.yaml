# Default values for inigma-fastapi.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: inigma-fastapi # Placeholder - replace with your actual image repo
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

# Define imagePullSecrets if using a private registry
# imagePullSecrets:
#   - name: my-registry-secret
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "" # If not set, a name is generated using the fullname template

podAnnotations: {}
# Example:
# podAnnotations:
#   linkerd.io/inject: enabled

podSecurityContext:
  runAsNonRoot: true
  # fsGroup: 1001 # Example, matches appuser's group if needed for volumes
  runAsUser: 1001 # Example, should ideally match appuser's UID if known, or a fixed non-root UID

securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  runAsNonRoot: true # Ensures container runs as non-root
  # runAsUser: 1001 # UID of appuser (if known and consistent)

service:
  type: ClusterIP
  port: 80 # Port exposed by the Kubernetes Service
  targetPort: 8000 # Port the container's application listens on (matches containerPort)

# containerPort is the port exposed by the container where Uvicorn runs
containerPort: 8000

ingress:
  enabled: false
  className: "" # For NGINX Ingress, set to "nginx" or your ingress controller's class
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: inigma-fastapi.local # Replace with your desired hostname
      paths:
        - path: /
          pathType: ImplementationSpecific # Or Prefix
  tls: []
  #  - secretName: inigma-fastapi-tls
  #    hosts:
  #      - inigma-fastapi.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Optional: Configure environment variables for the application
# Example:
# env:
#   - name: DATABASE_URL
#     value: "sqlite:///./inigma_next.db" # This would be for a container-local DB
#   - name: ANOTHER_CONFIG
#     valueFrom:
#       secretKeyRef:
#         name: mysecret
#         key: another_config_key
env: []

nodeSelector: {}

tolerations: []

affinity: {}
