<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inigma Settings</title>
    <link rel="stylesheet" href="css/tailwind.css"> <!-- Placeholder for bundled Tailwind -->
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f3f4f6; /* A light gray background */
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        input[type="url"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
        button {
            padding: 0.75rem 1.5rem;
            background-color: #4f46e5; /* Indigo */
            color: white;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #4338ca;
        }
        #status {
            margin-top: 1rem;
            color: green;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem;">Inigma Extension Settings</h1>
        
        <div>
            <label for="backendUrl">Backend URL:</label>
            <input type="url" id="backendUrl" placeholder="https://inigma.idone.su">
        </div>
        
        <button id="save">Save Settings</button>
        <div id="status"></div>
    </div>

    <script src="js/alpine.min.js" defer></script> <!-- Placeholder for bundled Alpine, if needed -->
    <script src="options.js"></script>
</body>
</html>
